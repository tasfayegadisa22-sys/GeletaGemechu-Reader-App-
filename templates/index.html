<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GeletaGemechu Reader App</title>
</head>
<body>
    <h1>እንኳን ወደ አነባቢው ድረ-ገጽ በደህና መጡ!</h1>
    <p>እባክዎ እንዲነበብልዎ የሚፈልጉትን ጽሁፍ (በእንግሊዝኛ) ከታች ባለው ሳጥን ውስጥ ያስገቡ።</p>
    
    <form action="/read" method="POST">
        <label for="text">ጽሁፍ ማስገቢያ ሳጥን፡</label><br>
        <textarea id="text" name="text" rows="8" cols="50" required></textarea><br><br>
        
        <button type="submit">ድምጹን አሰማኝ (Read Text)</button>
    </form>
</body>
</html>
